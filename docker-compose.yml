version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      NEUROPOD_DEMO_MODE: "true"
      NEUROPOD_STORE_PATH: /app/data/demo_store.json
      NEUROPOD_BASE_URL: http://localhost:8000
      NEUROPOD_FRONTEND_URL: http://localhost:3000
      ENABLE_SCHEDULER: "false"
    env_file:
      - .env
    volumes:
      - ./data:/app/data

  frontend:
    image: node:22-alpine
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://api:8000
    volumes:
      - ./:/app
    depends_on:
      - api

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: neuropod
      POSTGRES_USER: neuropod
      POSTGRES_PASSWORD: neuropod
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

volumes:
  pgdata:
